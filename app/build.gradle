apply plugin: 'com.android.application'

android {
    namespace 'com.demo.app'
    compileSdk 36

    defaultConfig {
        applicationId "com.demo.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation("io.github.sceneview:sceneview:3.6.0")
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.9.0" // Popups ke liye
}

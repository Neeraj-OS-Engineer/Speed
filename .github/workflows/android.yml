name: Speed Engine Pro Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-engine:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java 17 High-Performance Setup
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Execution Permissions
    - name: Grant Execute Permission
      run: chmod +x gradlew

    # 4. APK Quality & Optimization Check
    # Ye step compile karne se pehle check karega ki code smooth hai ya nahi
    - name: Engine Optimization Check
      run: ./gradlew lintDebug

    # 5. Build Multiple APKs (Debug & Release Checker)
    # Isse aapko do alag-alag variants milenge
    - name: Generate Smooth APKs
# --parallel se build fast hogi aur crash-free compile karega
      run: ./gradlew assemble --parallel --stacktrace

    # 6. Final APK Packaging (Direct Download)
    # Isme sirf APKs honge, koi फालतू text files nahi
    - name: Upload High-Quality APKs
      uses: actions/upload-artifact@v4
      with:
        name: Speed-Engine-Builds
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk

    # 7. Smoothness Verification
    - name: Final Integrity Check
      run: |
        if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "ERROR: Build Failed. Logic check karein."
          exit 1
        else
          echo "SUCCESS: Smooth APKs are ready for testing."
        fi

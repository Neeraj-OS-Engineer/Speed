name: Android 3D Engine Build & Report

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  engine-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository se code fetch karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java 17 Setup (SceneView/Filament ke liye mandatory)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradle execution permission dena
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Library Audit (Konsi library kitne MB ki hai aur kya download hua)
    - name: Library Dependency & Size Audit
      run: |
        ./gradlew app:dependencies > library_audit_report.txt
        echo "--- DEPENDENCY TREE GENERATED ---"

    # 5. Build Process with Stacktrace (Errors pakadne ke liye)
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      continue-on-error: true

    # 6. Automatic Report & APK Download (ZIP Package)
    # Ye step hamesha chalega chahe build fail ho ya pass
    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 3D-Engine-Build-Package
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/reports/
          library_audit_report.txt

    # 7. Final Status Verification
    - name: Final Build Check
      run: |
        if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "BUILD FAILED: Please download the '3D-Engine-Build-Package' from Artifacts to see error reports."
          exit 1
        else
          echo "BUILD SUCCESSFUL: APK and Reports are ready."
        fi

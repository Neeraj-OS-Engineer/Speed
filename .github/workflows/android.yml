name: Android 3D Engine Build & Report

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  engine-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository se code fetch karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java 17 Setup (SceneView/Filament ke liye mandatory)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradle execution permission dena
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Library Audit (Check karega konsi library download hui aur size kya hai)
    - name: Library Dependency Audit
      run: ./gradlew app:dependencies > library_audit.txt

    # 5. Build Debug APK (Yahan se error ka pata chalega)
    # Maine stacktrace aur info add kiya hai taaki detailed report mile
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    # 6. Build Reports aur APK ko Upload karna (ZIP Package)
    # 'if: always()' ensures ki fail hone par bhi aapko logs milein
    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 3D-Engine-Build-Package
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/reports/
          library_audit.txt

    # 7. Final Verification
    - name: Final Build Check
      run: |
        if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "BUILD FAILED! Check the 'Actions' tab log or download Artifacts."
          exit 1
        else
          echo "BUILD SUCCESSFUL! APK is ready."
        fi

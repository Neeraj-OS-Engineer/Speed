name: Android 3D Engine Build & Report

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  engine-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Library checking aur size report
    - name: Library Audit
      run: ./gradlew app:dependencies > library_audit.txt

    # YAHAN FIX HAI: continue-on-error hata diya hai takki error screen par dikhe
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    # Artifacts upload (APK aur Reports)
    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 3D-Engine-Build-Package
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/reports/
          library_audit.txt
